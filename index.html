<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>카드스티커 사진 편집기</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f1eb;color:#222;}
.container{max-width:1100px;margin:auto;padding:20px;}
h1{font-size:26px;margin:0 0 8px;}
p{font-size:14px;color:#555;}
.top{display:flex;gap:24px;flex-wrap:wrap;}
.panel{width:300px;background:white;padding:18px;border-radius:20px;box-shadow:0 5px 18px rgba(0,0,0,0.08);}
.preview{flex:1;background:white;padding:16px;border-radius:20px;display:flex;justify-content:center;align-items:center;min-height:600px;box-shadow:0 5px 18px rgba(0,0,0,0.08);}
.label{margin-top:14px;font-weight:bold;font-size:14px;}
select,button{width:100%;padding:13px;border-radius:14px;font-size:15px;margin-top:8px;}
button{border:none;background:black;color:white;cursor:pointer;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
canvas{max-width:100%;max-height:75vh;border-radius:24px;box-shadow:0 10px 35px rgba(0,0,0,0.16);touch-action:none;}
.info{margin-top:16px;font-size:13px;line-height:1.6;color:#555;}

@media(max-width:700px){
  .container{padding:14px;}
  h1{font-size:22px;}
  .top{display:block;}
  .panel{width:auto;margin-bottom:14px;padding:16px;}
  .preview{min-height:auto;padding:10px;}
  canvas{max-height:68vh;border-radius:18px;}
  .info{font-size:12px;}
}
</style>
</head>

<body>
<div class="container">
<h1>카드스티커 사진 편집기</h1>
<p>사진을 업로드한 뒤 손가락으로 위치, 확대, 회전을 조절해주세요.</p>

<div class="top">
<div class="panel">

<div class="label">1. 사진 업로드</div>
<input type="file" id="upload" accept="image/*" />

<div class="label">2. 상품 선택</div>
<select id="template">
<option value="cardPortrait">카드스티커 세로형</option>
<option value="cardLandscape">카드스티커 가로형</option>
</select>

<div class="label">3. 카드칩 타입</div>
<select id="chipType">
<option value="mini">미니형</option>
<option value="normal">일반형</option>
<option value="tossmini">토스미니형</option>
<option value="traffic">교통카드형</option>
</select>

<div class="grid">
<button onclick="resetImage()">초기화</button>
<button onclick="downloadImage()">PNG 저장</button>
</div>

<div class="info">
<b>조작 방법</b><br>
한 손가락 드래그 = 위치 이동<br>
두 손가락 벌리기 = 확대<br>
두 손가락 좁히기 = 축소<br>
두 손가락 돌리기 = 회전<br><br>
빨간 점선 = 안전선<br>
초록 점선 = 실제 컷팅되는 칼선
</div>

</div>

<div class="preview">
<canvas id="canvas"></canvas>
</div>
</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const templateSelect = document.getElementById("template");
const chipTypeSelect = document.getElementById("chipType");

let userImg = null;
let guideImg = new Image();

let scale = 1;
let posX = 0;
let posY = 0;
let rotation = 0;

let isDragging = false;
let lastX = 0;
let lastY = 0;

let initialDistance = 0;
let initialAngle = 0;
let initialScale = 1;
let initialRotation = 0;

function getGuideFile(){
  const type = templateSelect.value;
  const chip = chipTypeSelect.value;

  if(type === "cardPortrait") return `guide-${chip}-portrait.png`;
  if(type === "cardLandscape") return `guide-${chip}-landscape.png`;

  return "";
}

function loadGuide(){
  const guideFile = getGuideFile();
  guideImg = new Image();

  guideImg.onload = function(){
    canvas.width = guideImg.naturalWidth;
    canvas.height = guideImg.naturalHeight;
    draw();
  };

  guideImg.src = guideFile;
}

function draw(showGuide = true){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#f0ebe5";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(userImg){
    const imageRatio = userImg.width / userImg.height;
    const canvasRatio = canvas.width / canvas.height;

    let drawWidth;
    let drawHeight;

    if(imageRatio > canvasRatio){
      drawHeight = canvas.height * scale;
      drawWidth = drawHeight * imageRatio;
    }else{
      drawWidth = canvas.width * scale;
      drawHeight = drawWidth / imageRatio;
    }

    ctx.save();
    ctx.translate(canvas.width / 2 + posX, canvas.height / 2 + posY);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.drawImage(userImg, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
    ctx.restore();

  }else{
    ctx.fillStyle = "#999";
    ctx.font = "28px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("사진을 업로드해주세요", canvas.width/2, canvas.height/2);
  }

  if(showGuide && guideImg.complete){
    ctx.drawImage(guideImg, 0, 0, canvas.width, canvas.height);
  }
}

upload.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    userImg = new Image();

    userImg.onload = function(){
      resetImage();
    };

    userImg.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

templateSelect.addEventListener("change", function(){
  resetImage();
  loadGuide();
});

chipTypeSelect.addEventListener("change", function(){
  loadGuide();
});

function getCanvasPointFromTouch(touch){
  const rect = canvas.getBoundingClientRect();
  return {
    x:(touch.clientX - rect.left) * (canvas.width / rect.width),
    y:(touch.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function getDistance(t1,t2){
  const p1 = getCanvasPointFromTouch(t1);
  const p2 = getCanvasPointFromTouch(t2);
  return Math.hypot(p2.x - p1.x, p2.y - p1.y);
}

function getAngle(t1,t2){
  const p1 = getCanvasPointFromTouch(t1);
  const p2 = getCanvasPointFromTouch(t2);
  return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
}

canvas.addEventListener("touchstart", function(e){
  if(!userImg) return;
  e.preventDefault();

  if(e.touches.length === 1){
    const p = getCanvasPointFromTouch(e.touches[0]);
    isDragging = true;
    lastX = p.x;
    lastY = p.y;
  }

  if(e.touches.length === 2){
    isDragging = false;
    initialDistance = getDistance(e.touches[0], e.touches[1]);
    initialAngle = getAngle(e.touches[0], e.touches[1]);
    initialScale = scale;
    initialRotation = rotation;
  }
},{passive:false});

canvas.addEventListener("touchmove", function(e){
  if(!userImg) return;
  e.preventDefault();

  if(e.touches.length === 1 && isDragging){
    const p = getCanvasPointFromTouch(e.touches[0]);
    posX += p.x - lastX;
    posY += p.y - lastY;
    lastX = p.x;
    lastY = p.y;
    draw();
  }

  if(e.touches.length === 2){
    const newDistance = getDistance(e.touches[0], e.touches[1]);
    const newAngle = getAngle(e.touches[0], e.touches[1]);

    scale = initialScale * (newDistance / initialDistance);
    rotation = initialRotation + (newAngle - initialAngle);

    scale = Math.max(0.3, Math.min(scale, 5));

    draw();
  }
},{passive:false});

canvas.addEventListener("touchend", function(){
  isDragging = false;
});

canvas.addEventListener("mousedown", function(e){
  if(!userImg) return;
  isDragging = true;
  const rect = canvas.getBoundingClientRect();
  lastX = (e.clientX - rect.left) * (canvas.width / rect.width);
  lastY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener("mousemove", function(e){
  if(!isDragging || !userImg) return;

  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  posX += x - lastX;
  posY += y - lastY;

  lastX = x;
  lastY = y;

  draw();
});

canvas.addEventListener("mouseup", function(){
  isDragging = false;
});

canvas.addEventListener("mouseleave", function(){
  isDragging = false;
});

function resetImage(){
  scale = 1;
  posX = 0;
  posY = 0;
  rotation = 0;
  draw();
}

function downloadImage(){
  draw(false);

  const link = document.createElement("a");
  link.download = "card-sticker-image.png";
  link.href = canvas.toDataURL("image/png");
  link.click();

  draw(true);
}

loadGuide();
</script>
</body>
</html>
