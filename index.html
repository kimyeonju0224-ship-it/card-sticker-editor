<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드스티커 사진 편집기</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f1eb;
  color:#222;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}
h1{font-size:32px;margin-bottom:10px;}
.top{display:flex;gap:30px;flex-wrap:wrap;}
.panel{
  width:330px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
.preview{
  flex:1;
  background:white;
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:700px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
.label{
  margin-top:18px;
  font-weight:bold;
  font-size:14px;
}
select, button{
  width:100%;
  padding:15px;
  border-radius:14px;
  font-size:16px;
  margin-top:10px;
}
button{
  border:none;
  background:black;
  color:white;
  cursor:pointer;
}
input[type="range"]{width:100%;}
canvas{
  max-width:100%;
  max-height:75vh;
  border-radius:28px;
  box-shadow:0 10px 40px rgba(0,0,0,0.18);
  cursor:grab;
}
.info{
  margin-top:20px;
  font-size:14px;
  line-height:1.7;
  color:#555;
}
</style>
</head>

<body>
<div class="container">
  <h1>카드스티커 사진 편집기</h1>
  <p>사진을 업로드한 뒤 위치와 크기를 조절해주세요.</p>

  <div class="top">
    <div class="panel">
      <div class="label">1. 사진 업로드</div>
      <input type="file" id="upload" accept="image/*" />

      <div class="label">2. 상품 선택</div>
      <select id="template">
        <option value="cardPortrait">카드스티커 세로형</option>
        <option value="cardLandscape">카드스티커 가로형</option>
      </select>

      <div class="label">3. 카드칩 타입</div>
      <select id="chipType">
        <option value="mini">미니형</option>
        <option value="normal">일반형</option>
        <option value="tossmini">토스미니형</option>
        <option value="traffic">교통카드형</option>
      </select>

      <div class="label">4. 확대 / 축소</div>
      <input type="range" id="scale" min="0.5" max="3" step="0.01" value="1" />

      <button onclick="resetImage()">초기화</button>
      <button onclick="downloadImage()">PNG 저장</button>

      <div class="info">
        <b>안내</b><br>
        빨간 점선 = 안전선<br>
        초록 점선 = 실제 컷팅되는 칼선<br>
        카드칩 위치는 선택한 타입에 따라 자동으로 표시됩니다.<br><br>
        중요한 얼굴, 글자, 손가락은 빨간 안전선 안쪽에 들어오게 맞춰주세요.
      </div>
    </div>

    <div class="preview">
      <canvas id="canvas"></canvas>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const scaleSlider = document.getElementById("scale");
const templateSelect = document.getElementById("template");
const chipTypeSelect = document.getElementById("chipType");

let userImg = null;
let guideImg = new Image();

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;
let startX = 0;
let startY = 0;

function getGuideFile(){
  const type = templateSelect.value;
  const chip = chipTypeSelect.value;

  if(type === "cardPortrait"){
    return `guide-${chip}-portrait.png`;
  }

  if(type === "cardLandscape"){
    return `guide-${chip}-landscape.png`;
  }

  return "";
}

function loadGuide(){
  const guideFile = getGuideFile();

  guideImg = new Image();

  guideImg.onload = function(){
    canvas.width = guideImg.naturalWidth;
    canvas.height = guideImg.naturalHeight;
    draw();
  };

  guideImg.src = guideFile;
}

function draw(showGuide = true){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#f0ebe5";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(userImg){
    const imageRatio = userImg.width / userImg.height;
    const canvasRatio = canvas.width / canvas.height;

    let drawWidth;
    let drawHeight;

    if(imageRatio > canvasRatio){
      drawHeight = canvas.height * scale;
      drawWidth = drawHeight * imageRatio;
    }else{
      drawWidth = canvas.width * scale;
      drawHeight = drawWidth / imageRatio;
    }

    const x = canvas.width/2 - drawWidth/2 + posX;
    const y = canvas.height/2 - drawHeight/2 + posY;

    ctx.drawImage(userImg, x, y, drawWidth, drawHeight);
  }else{
    ctx.fillStyle = "#999";
    ctx.font = "28px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("사진을 업로드해주세요", canvas.width/2, canvas.height/2);
  }

  if(showGuide && guideImg.complete){
    ctx.drawImage(guideImg, 0, 0, canvas.width, canvas.height);
  }
}

upload.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    userImg = new Image();

    userImg.onload = function(){
      scale = 1;
      posX = 0;
      posY = 0;
      scaleSlider.value = 1;
      draw();
    };

    userImg.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

templateSelect.addEventListener("change", function(){
  resetImage();
  loadGuide();
});

chipTypeSelect.addEventListener("change", function(){
  loadGuide();
});

scaleSlider.addEventListener("input", function(){
  scale = Number(scaleSlider.value);
  draw();
});

canvas.addEventListener("mousedown", function(e){
  dragging = true;
  startX = e.offsetX;
  startY = e.offsetY;
});

canvas.addEventListener("mousemove", function(e){
  if(!dragging) return;

  posX += e.offsetX - startX;
  posY += e.offsetY - startY;

  startX = e.offsetX;
  startY = e.offsetY;

  draw();
});

canvas.addEventListener("mouseup", function(){
  dragging = false;
});

canvas.addEventListener("mouseleave", function(){
  dragging = false;
});

function resetImage(){
  scale = 1;
  posX = 0;
  posY = 0;
  scaleSlider.value = 1;
  draw();
}

function downloadImage(){
  draw(false);

  const link = document.createElement("a");
  link.download = "card-sticker-image.png";
  link.href = canvas.toDataURL("image/png");
  link.click();

  draw(true);
}

loadGuide();
</script>
</body>
</html>
